# CozyVoice Base Runtime
# 1Panel 专用 Docker Compose 编排文件
#
# 部署前准备：
#   1. 构建本地镜像：cd deploy/base_runtime && ./build.sh
#   2. 准备 .env（复制仓库根 .env.example）
#   3. 确保外部网络存在：docker network create 1panel-network（或 1panel-network）
#
# 数据目录：/data/CozyVoice/
# 网络：1panel-network（external）

services:

  # ==========================================
  # CozyVoice FastAPI 服务（REST + WS）
  # ==========================================
  cozy_voice:
    image: cozy-voice:latest
    container_name: cozy_voice
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LOG_LEVEL: INFO
      VOICE_HOST: 0.0.0.0
      VOICE_PORT: 8002
    volumes:
      - /data/CozyVoice/logs:/app/logs
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  cozy_livekit:
    image: livekit/livekit-server:v1.8
    container_name: cozy_livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml --node-ip ${NODE_IP:-0.0.0.0}
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecret}"
    volumes:
      - ../livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50200:50000-50200/udp"
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  # ==========================================
  # Caddy 反向代理
  # ==========================================
  caddy:
    image: caddy:alpine
    container_name: cozy_voice_caddy
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /data/CozyVoice/caddy/data:/data
      - /data/CozyVoice/caddy/config:/config
    depends_on:
      - cozy_voice
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
