<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>CozyVoice Realtime Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://unpkg.com/livekit-client/dist/livekit-client.umd.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .sub { color: #888; font-size: 13px; margin-bottom: 24px; }
    label { display: block; margin-top: 12px; font-size: 13px; color: #555; }
    input { width: 100%; padding: 8px 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; font-family: ui-monospace, monospace; }
    button { margin-top: 20px; padding: 10px 18px; background: #2563eb; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    .status { margin-top: 20px; padding: 12px; background: #f3f4f6; border-left: 3px solid #2563eb; border-radius: 2px; font-family: ui-monospace, monospace; font-size: 13px; white-space: pre-wrap; min-height: 60px; }
    .status.error { border-color: #dc2626; background: #fef2f2; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; background: #e5e7eb; color: #374151; margin-right: 6px; }
    .badge.on { background: #bbf7d0; color: #166534; }
  </style>
</head>
<body>
  <h1>CozyVoice Realtime Demo</h1>
  <div class="sub">前端极简页：连 LiveKit room → 发麦克风 → 收 Agent 音频。</div>

  <label>LiveKit URL（ws:// 或 wss://）</label>
  <input id="url" placeholder="ws://localhost:7880" value="ws://localhost:7880" />

  <label>Token（短期访问令牌，需服务端签发）</label>
  <input id="token" placeholder="eyJhbGciOi..." />

  <label>Session ID（CozyBrain 会话 ID）</label>
  <input id="sess" placeholder="sess_abc" />

  <label>Personality ID</label>
  <input id="pid" placeholder="default" value="default" />

  <button id="start">开始通话</button>
  <button id="stop" disabled>挂断</button>

  <div class="status" id="status">
    <span class="badge" id="b-conn">未连接</span>
    <span class="badge" id="b-mic">麦克风 off</span>
    <span class="badge" id="b-recv">无 Agent 音频</span>
    <div style="margin-top:8px" id="log">就绪。</div>
  </div>

  <audio id="remote-audio" autoplay playsinline></audio>

  <script>
    const { Room, RoomEvent, Track, createLocalAudioTrack } = LivekitClient;

    const $ = (id) => document.getElementById(id);
    const log = (msg, isErr = false) => {
      console.log(msg);
      $("log").textContent = msg;
      $("status").classList.toggle("error", isErr);
    };
    const setBadge = (id, text, on = false) => {
      const el = $(id);
      el.textContent = text;
      el.classList.toggle("on", on);
    };

    let room = null;

    $("start").onclick = async () => {
      const url = $("url").value.trim();
      const token = $("token").value.trim();
      if (!url || !token) { log("请先填写 LiveKit URL 和 Token", true); return; }

      $("start").disabled = true;
      $("stop").disabled = false;

      try {
        room = new Room({ adaptiveStream: true, dynacast: true });

        room.on(RoomEvent.TrackSubscribed, (track, pub, participant) => {
          log(`收到远端 track: ${track.kind} from ${participant.identity}`);
          if (track.kind === Track.Kind.Audio) {
            track.attach($("remote-audio"));
            setBadge("b-recv", "Agent speaking", true);
          }
        });
        room.on(RoomEvent.Disconnected, (reason) => {
          log(`已断开：${reason || "unknown"}`);
          setBadge("b-conn", "未连接");
          setBadge("b-mic", "麦克风 off");
          setBadge("b-recv", "无 Agent 音频");
          $("start").disabled = false;
          $("stop").disabled = true;
        });
        room.on(RoomEvent.ActiveSpeakersChanged, (speakers) => {
          const names = speakers.map(s => s.identity).join(", ");
          if (names) log(`说话中：${names}`);
        });

        log(`连接 ${url} …`);
        await room.connect(url, token);
        setBadge("b-conn", "connected", true);
        log(`已连入 room=${room.name} as ${room.localParticipant.identity}`);

        const mic = await createLocalAudioTrack({
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
        });
        await room.localParticipant.publishTrack(mic);
        setBadge("b-mic", "麦克风 on", true);
        log("麦克风已 publish");
      } catch (e) {
        log(`失败：${e.message || e}`, true);
        $("start").disabled = false;
        $("stop").disabled = true;
      }
    };

    $("stop").onclick = async () => {
      if (room) { await room.disconnect(); room = null; }
    };
  </script>
</body>
</html>
